<div class="row g-4 mb-4">

    <!-- Total Bookings -->

    <div class="col-xl-2 col-lg-4 col-md-6">

        <div class="kpi-card booking">

            <div class="d-flex justify-content-between align-items-start">

                <div>

                    <h6>Total Bookings</h6>

                    <h2>{{kpi.total_bookings}}</h2>

                    <p>

                        <i class="fa fa-arrow-up"></i>

                        8.5% from last month

                    </p>

                </div>

                <div class="icon-circle">

                    <i class="fa fa-calendar-check"></i>

                </div>

            </div>

            <div class="progress mt-4">

                <div class="progress-bar"

                     style="width:84%">

                </div>

            </div>

        </div>

    </div>


    <!-- Confirmed -->

    <div class="col-xl-2 col-lg-4 col-md-6">

        <div class="kpi-card confirmed">

            <div class="d-flex justify-content-between">

                <div>

                    <h6>Confirmed</h6>

                    <h2>{{kpi.confirmed}}</h2>

                    <p>

                        <i class="fa fa-arrow-up"></i>

                        4.2% Growth

                    </p>

                </div>

                <div class="icon-circle">

                    <i class="fa fa-check-circle"></i>

                </div>

            </div>

            <div class="progress mt-4">

                <div class="progress-bar"

                     style="width:92%">

                </div>

            </div>

        </div>

    </div>


    <!-- Cancelled -->

    <div class="col-xl-2 col-lg-4 col-md-6">

        <div class="kpi-card cancel">

            <div class="d-flex justify-content-between">

                <div>

                    <h6>Cancelled</h6>

                    <h2>{{kpi.cancelled}}</h2>

                    <p>

                        <i class="fa fa-arrow-down"></i>

                        2.3% Reduced

                    </p>

                </div>

                <div class="icon-circle">

                    <i class="fa fa-times-circle"></i>

                </div>

            </div>

            <div class="progress mt-4">

                <div class="progress-bar"

                     style="width:38%">

                </div>

            </div>

        </div>

    </div>


    <!-- ADR -->

    <div class="col-xl-2 col-lg-4 col-md-6">

        <div class="kpi-card adr">

            <div class="d-flex justify-content-between">

                <div>

                    <h6>Average ADR</h6>

                    <h2>${{kpi.adr}}</h2>

                    <p>

                        Average Daily Rate

                    </p>

                </div>

                <div class="icon-circle">

                    <i class="fa fa-dollar-sign"></i>

                </div>

            </div>

            <div class="progress mt-4">

                <div class="progress-bar"

                     style="width:70%">

                </div>

            </div>

        </div>

    </div>


    <!-- Lead Time -->

    <div class="col-xl-2 col-lg-4 col-md-6">

        <div class="kpi-card revenue">

            <div class="d-flex justify-content-between">

                <div>

                    <h6>Lead Time</h6>

                    <h2>{{kpi.lead_time}}</h2>

                    <p>

                        Average Booking Lead

                    </p>

                </div>

                <div class="icon-circle">

                    <i class="fa fa-clock"></i>

                </div>

            </div>

            <div class="progress mt-4">

                <div class="progress-bar"

                     style="width:61%">

                </div>

            </div>

        </div>

    </div>


    <!-- Stay -->

    <div class="col-xl-2 col-lg-4 col-md-6">

        <div class="kpi-card stay">

            <div class="d-flex justify-content-between">

                <div>

                    <h6>Average Stay</h6>

                    <h2>{{kpi.stay}}</h2>

                    <p>

                        Night(s)

                    </p>

                </div>

                <div class="icon-circle">

                    <i class="fa fa-bed"></i>

                </div>

            </div>

            <div class="progress mt-4">

                <div class="progress-bar"

                     style="width:80%">

                </div>

            </div>

        </div>

    </div>

</div>
