{% extends "base.html" %}

{% block content %}
<link
rel="stylesheet"
href="{{ url_for('static', filename='css/notebook.css') }}">
<div class="page-header mb-5">

    <h2>

        <i class="fa-solid fa-book"></i>

        Project Notebooks

    </h2>

    <p class="text-muted">

        Complete analysis notebooks used during the project.

    </p>

</div>


<div class="row g-4">

{% for notebook in notebooks %}

<div class="col-lg-4">

    <div class="report-box">

        <i class="fa-solid fa-file-code report-icon"></i>

        <h4>

            {{ notebook.replace(".ipynb","").replace("_"," ") }}

        </h4>

        <p>

            Jupyter Notebook

        </p>

        <a href="{{ url_for('download_notebook',filename=notebook) }}"

           class="btn btn-primary w-100">

            <i class="fa-solid fa-download"></i>

            Download

        </a>

    </div>

</div>

{% endfor %}

</div>

{% endblock %}
