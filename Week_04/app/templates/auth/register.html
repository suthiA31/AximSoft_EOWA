{% extends "base.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body p-4">

                    <h2 class="text-center mb-4">
                        Register
                    </h2>

                    <form method="POST">

                        <input
                            type="text"
                            name="name"
                            class="form-control mb-3"
                            placeholder="Full Name"
                            required>

                        <input
                            type="email"
                            name="email"
                            class="form-control mb-3"
                            placeholder="Email"
                            required>

                        <input
                            type="password"
                            name="password"
                            class="form-control mb-3"
                            placeholder="Password"
                            required>

                        <input
                            type="password"
                            name="confirm_password"
                            class="form-control mb-3"
                            placeholder="Confirm Password"
                            required>

                        <button
                            class="btn btn-primary w-100">

                            Register

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
