{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h2>Edit Course</h2>

            <form method="POST">

                <input
                    type="text"
                    name="course_name"
                    class="form-control mb-3"
                    value="{{ course.course_name }}"
                    required>

                <input
                    type="text"
                    name="category"
                    class="form-control mb-3"
                    value="{{ course.category }}"
                    required>

                <input
                    type="text"
                    name="duration"
                    class="form-control mb-3"
                    value="{{ course.duration }}"
                    required>

                <textarea
                    name="description"
                    class="form-control mb-3"
                    rows="4"
                    required>{{ course.description }}</textarea>

                <button
                    class="btn btn-warning">

                    Update Course

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
