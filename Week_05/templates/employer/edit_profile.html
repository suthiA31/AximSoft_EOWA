{% extends "base.html" %}

{% block title %}
Edit Employer Profile
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">
                        Edit Employer Profile
                    </h3>
                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">
                                Name
                            </label>

                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                value="{{ current_user.name }}"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Company / Skills
                            </label>

                            <input
                                type="text"
                                name="skills"
                                class="form-control"
                                value="{{ current_user.skills }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Experience
                            </label>

                            <input
                                type="text"
                                name="experience"
                                class="form-control"
                                value="{{ current_user.experience }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                About Company
                            </label>

                            <textarea
                                name="bio"
                                class="form-control"
                                rows="5">{{ current_user.bio }}</textarea>
                        </div>

                        <div class="text-center">

                            <button
                                type="submit"
                                class="btn btn-success">

                                <i class="bi bi-check-circle"></i>
                                Update Profile

                            </button>

                            <a href="{{ url_for('employer.profile') }}"
                               class="btn btn-secondary">

                                Cancel

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
