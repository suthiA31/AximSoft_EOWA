{% extends 'base.html' %}

{% block title %}Post Job{% endblock %}

{% block content %}

<div class="card shadow">


<div class="card-body">

    <h2 class="mb-4">
        Post New Job
    </h2>

    <form method="POST">



        <div class="mb-3">
            <label>Job Title</label>
            <input type="text"
                   name="title"
                   class="form-control">
        </div>
        <div class="mb-3">
                <label>Company Name</label>
                <input type="text"
                       name="company"
                       class="form-control"
                       value="{{ current_user.company_name }}"
                       disabled>
            </div>

        <div class="mb-3">
            <label>Location</label>
            <input type="text"
                   name="location"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Experience</label>
            <input type="text"
                   name="experience"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Salary</label>
            <input type="text"
                   name="salary"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Skills</label>
            <input type="text"
                   name="skills"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Description</label>
            <textarea name="description"
                      rows="5"
                      class="form-control"></textarea>
        </div>

        <button class="btn btn-success">
            Post Job
        </button>

    </form>

</div>


</div>

{% endblock %}
