{% extends 'base.html' %}

{% block title %}Jobs{% endblock %}

{% block content %}

<h2 class="mb-4">Available Jobs</h2>

<form method="GET" class="mb-4">

<div class="row">

    <div class="col-md-10">
        <input type="text"
               name="search"
               class="form-control"
               placeholder="Search Jobs">
    </div>

    <div class="col-md-2">
        <button class="btn btn-primary w-100">
            Search
        </button>
    </div>

</div>


</form>

<div class="row">

{% for job in jobs %}

<div class="col-md-4 mb-4">


<div class="card shadow h-100">

    <div class="card-body">

        <h4>{{ job.title }}</h4>

        <h6 class="text-muted">
            {{ job.company_name }}
        </h6>

        <p>
            <i class="bi bi-geo-alt"></i>
            {{ job.location }}
        </p>

        <p>
            Salary: {{ job.salary }}
        </p>

        <p>
            Experience:
            {{ job.experience }}
        </p>

        <a href="{{ url_for('jobs.job_details', id=job.id) }}"
           class="btn btn-primary">
            View Details
        </a>

    </div>

</div>


</div>

{% endfor %}

</div>

{% endblock %}
