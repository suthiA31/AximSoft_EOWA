<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>House Price Analytics</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/dashboard.css') }}">


</head>

<body>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<div class="wrapper">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <i class="fa-solid fa-house-circle-check"></i>

            <span>House Analytics</span>

        </div>

        <ul>

            <li>
                <a href="{{ url_for('dashboard') }}"
   class="{% if request.endpoint=='dashboard' %}active{% endif %}">Dashboard</a>

            </li>

            <li>

               <a href="{{ url_for('prediction') }}"
   class="{% if request.endpoint=='prediction' %}active{% endif %}">Prediction</a>

            </li>

            <li>

               <a href="{{ url_for('analytics') }}"
   class="{% if request.endpoint=='analytics' %}active{% endif %}">Analytics</a>

            </li>

            <li>

                <a href="{{ url_for('comparison') }}"
   class="{% if request.endpoint=='comparison' %}active{% endif %}">Comparison</a>

            </li>

            <li>

                <a href="{{ url_for('reports') }}"
   class="{% if request.endpoint=='reports' %}active{% endif %}">Reports</a>

            </li>

        </ul>

    </aside>


    <!-- Main -->

    <div class="main-content">

        <!-- Top Navbar -->

        <nav class="top-navbar">

            <div>

                <h3>📈 Advanced Regression Platform</h3>

                <small>
                    Predict • Compare • Optimize • Analyze
                </small>

            </div>

            <div class="profile">

                <i class="fa-solid fa-user-circle"></i>

            </div>

        </nav>

        <div class="page-content">

            {% block content %}

            {% endblock %}

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
