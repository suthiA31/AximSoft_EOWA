<div class="row mt-4">

    <div class="col-lg-12">

        <div class="chart-card">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h3>
                    <i class="bi bi-lightbulb-fill text-warning"></i>
                    Business Insights
                </h3>

                <span class="badge bg-success">
                    Live Analytics
                </span>

            </div>

            <div class="row">

                <!-- Revenue -->

                <div class="col-md-6 col-lg-3">

                    <div class="insight-card">

                        <div class="insight-icon revenue-bg">

                            <i class="bi bi-cash-stack"></i>

                        </div>

                        <h5>Total Revenue</h5>

                        <h2>

                            ${{ "{:,.2f}".format(kpis.revenue) }}

                        </h2>

                        <p>

                            Revenue Growth

                            <span class="text-success">

                                {{ kpis.growth }}%

                            </span>

                        </p>

                    </div>

                </div>

                <!-- State -->

                <div class="col-md-6 col-lg-3">

                    <div class="insight-card">

                        <div class="insight-icon state-bg">

                            <i class="bi bi-geo-alt-fill"></i>

                        </div>

                        <h5>Top State</h5>

                        <h2>

                            {{ kpis.top_state }}

                        </h2>

                        <p>

                            Highest Revenue State

                        </p>

                    </div>

                </div>

                <!-- Category -->

                <div class="col-md-6 col-lg-3">

                    <div class="insight-card">

                        <div class="insight-icon category-bg">

                            <i class="bi bi-box-fill"></i>

                        </div>

                        <h5>Top Category</h5>

                        <h2>

                            {{ kpis.top_category }}

                        </h2>

                        <p>

                            Best Selling Category

                        </p>

                    </div>

                </div>

                <!-- Payment -->

                <div class="col-md-6 col-lg-3">

                    <div class="insight-card">

                        <div class="insight-icon payment-bg">

                            <i class="bi bi-credit-card-fill"></i>

                        </div>

                        <h5>Payment Method</h5>

                        <h2>

                            {{ kpis.top_payment }}

                        </h2>

                        <p>

                            Most Preferred

                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
